<a class="skip-link" href="#experience">Skip to professional experience</a>

<header [class.scrolled]="headerScrolled" [class.menu-open]="menuOpen">
  <nav aria-label="Primary navigation">
    <a class="brand" href="#home" (click)="scrollToSection($event, 'home')">
      Amanda Mar
    </a>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen"
      aria-controls="primary-links"
      aria-label="Toggle navigation"
      (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul id="primary-links" [class.open]="menuOpen">
      <li>
        <a
          href="#experience"
          [class.active]="activeSection === 'experience'"
          (click)="scrollToSection($event, 'experience')">Experience</a>
      </li>
      <li>
        <a
          href="#technology"
          [class.active]="activeSection === 'technology'"
          (click)="scrollToSection($event, 'technology')">Skills</a>
      </li>
      <li>
        <a
          href="#projects"
          [class.active]="activeSection === 'projects'"
          (click)="scrollToSection($event, 'projects')">Projects</a>
      </li>
      <li>
        <a
          href="#about"
          [class.active]="activeSection === 'about'"
          (click)="scrollToSection($event, 'about')">About</a>
      </li>
    </ul>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer>
  <div class="social-icons">
    <a
      href="https://www.linkedin.com/in/amanda-mar/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Amanda Mar on LinkedIn">
      <i class="fa fa-brands fa-linkedin-square"></i>
    </a>
  </div>
  <div class="page-links">
    <a href="#experience" (click)="scrollToSection($event, 'experience')">Experience</a>
    <a href="#technology" (click)="scrollToSection($event, 'technology')">Skills</a>
    <a href="#projects" (click)="scrollToSection($event, 'projects')">Projects</a>
    <a href="#about" (click)="scrollToSection($event, 'about')">About</a>
    <a href="#contact" (click)="scrollToSection($event, 'contact')">Contact</a>
  </div>
  <p>&copy; {{ date.getFullYear() }} {{ author }}</p>
</footer>
